    async function loadStats() {
        if (!supabase) return;
        const { data, error } = await supabase.from('counters').select('*');
        if (error) return;
        let html = '<ul>';
        let total = 0;
        data.forEach(row => {
            const name = serviceNames[row.service_type] || row.service_type;
            html += `<li>${name} — <strong>${row.count} шт.</strong></li>`;
            total += row.count;
        });
        html += `</ul><br><strong>Всего документов подготовлено: ${total} шт.</strong>`;
        document.getElementById('statsContent').innerHTML = html;
    }

    async function incrementCounter(serviceType) {

                    <label>ФИО Исполнителя *</label><input id="duIspoln" placeholder="Петров Петр Петрович">
                    <label>Предмет договора *</label><textarea id="duPredmet" placeholder="Какие именно услуги"></textarea>
                    <label>Срок оказания услуг *</label><input id="duSrok" placeholder="С 01.01.2026 по 31.12.2026">
                    <label>Стоимость услуг *</label><input id="duStoimost" placeholder="50000 руб.">
                    <label>Порядок сдачи-приемки</label><textarea id="duPriemka" placeholder="Акт приема-передачи"></textarea>
                    <label>Ответственность сторон</label><textarea id="duOtvetstv" placeholder="Штрафы за просрочку"></textarea>
                    <label>Условия расторжения</label><textarea id="duRastorg"></textarea>
                `;
                break;
            case 'kopiya':
                html = `
                    <label>ФИО Заявителя *</label><input id="kopFIO" placeholder="Иванов Иван Иванович">
                    <label>Наименование суда *</label><input id="kopSud" placeholder="Судебный участок № 1">
                    <label>Номер дела *</label><input id="kopCase" placeholder="2-1234/2026">
                    <label>Ваш процессуальный статус *</label><select id="kopStatus"><option value="истец">Истец</option><option value="ответчик">Ответчик</option><option value="третье лицо">Третье лицо</option></select>
                    <label>Дата решения (если известна)</label><input type="date" id="kopDate">
                    <label>Контактный телефон</label><input id="kopTel">
                `;
                break;
            case 'rospotrebnadzor':
                html = `
                    <label>ФИО Заявителя *</label><input id="rpnFIO" placeholder="Иванов Иван Иванович">
                    <label>Наименование продавца (исполнителя) *</label><input id="rpnOrg" placeholder="ООО «Ромашка»">
                    <label>Суть нарушения *</label><textarea id="rpnNarush" placeholder="Продали некачественный товар"></textarea>
                    <label>Адрес, где произошло нарушение</label><input id="rpnAddr">
                    <label>Ваши требования</label><textarea id="rpnTreb" placeholder="Проверка, штраф"></textarea>
                    <label>Сумма ущерба</label><input id="rpnSum">
                    <label>Приложенные документы (чеки, договор) – в чат</label>
                `;
                break;
            case 'trud':
                html = `
                    <label>ФИО Заявителя *</label><input id="trFIO" placeholder="Иванов Иван Иванович">
                    <label>Наименование работодателя *</label><input id="trOrg" placeholder="ООО «Ромашка»">
                    <label>ИНН и адрес работодателя *</label><input id="trINN" placeholder="ИНН, адрес">
                    <label>Суть нарушения *</label><textarea id="trNarush" placeholder="Задержка зарплаты, незаконное увольнение"></textarea>
                    <label>Адрес для ответа</label><input id="trAddr" placeholder="Почтовый или email">
                    <label>Контактный телефон</label><input id="trTel">
                    <label>Дата нарушения</label><input type="date" id="trDate">
                `;
                break;
            case 'apellyaciya':
                html = `
                    <label>ФИО Заявителя *</label><input id="apFIO" placeholder="Иванов Иван Иванович">
                    <label>Наименование суда апелляционной инстанции *</label><input id="apSud" placeholder="Мосгорсуд">
                    <label>Номер дела *</label><input id="apCase" placeholder="2-1234/2026">
                    <label>Дата обжалуемого решения *</label><input type="date" id="apDate">
                    <label>Причины несогласия *</label><textarea id="apPrich"></textarea>
                    <label>Наименование суда первой инстанции</label><input id="apFirstSud">
                    <label>Ходатайства (новые доказательства)</label><textarea id="apHodat"></textarea>
                `;
                break;
            case 'kassaciya':
                html = `
                    <label>ФИО Заявителя *</label><input id="ksFIO" placeholder="Иванов Иван Иванович">
                    <label>Наименование суда кассационной инстанции *</label><input id="ksSud" placeholder="Второй кассационный суд">
                    <label>Номер дела *</label><input id="ksCase" placeholder="2-1234/2026">
                    <label>Дата обжалуемых судебных актов *</label><input id="ksDate" placeholder="Решение и апелляционное определение">
                    <label>Причины несогласия *</label><textarea id="ksPrich"></textarea>
                    <label>Наименования всех судов, рассматривавших дело</label><textarea id="ksAllSuds"></textarea>
                    <label>Ходатайства (о приостановлении исполнения)</label><textarea id="ksHodat"></textarea>
                `;
                break;
        }

        container.innerHTML = html;

        // Обработчик для "Другое" в иске
        if (service === 'isk') {
            const osnovanie = document.getElementById('osnovanie');
            const other = document.getElementById('osnovanieOther');
            if (osnovanie && other) {
                osnovanie.addEventListener('change', function() {
                    other.classList.toggle('hidden', this.value !== 'Другое');
                });
            }
        }
    }

    document.getElementById('service').addEventListener('change', function() {
        const s = this.value;
        document.getElementById('priceBlock').innerHTML = `💰 Стоимость: <strong>${prices[s]} ₽</strong>`;
        buildSpecialFields(s);
    });

    // Инициализация при загрузке
    buildSpecialFields('isk');
    loadStats();

    // Отправка формы
    document.getElementById('submitBtn').addEventListener('click', async function() {
        const name = document.getElementById('clientName').value.trim();
        const phone = document.getElementById('clientPhone').value.trim();
        if (!name || !phone) return alert('Заполните имя и телефон.');

        const service = document.getElementById('service').value;
        const amount = prices[service];
        const help = document.getElementById('helpCheckbox').checked ? ' (требуется помощь)' : '';
        const desc = `Заявка от ${name} (${phone}). Услуга: ${serviceNames[service]}. ${help}`;

        // Платёж
        if (typeof window.WebApp !== 'undefined' && window.WebApp?.platform === 'max') {
            // MAX Pay (заглушка)
            alert(`Оплата через MAX Pay: ${amount} ₽. ${desc}`);
            await incrementCounter(service);
            window.open(`https://vk.com/im?sel=c${Math.abs(GROUP_ID)}`, '_blank');
        } else {
            // VK Pay
            if (window.vkBridge) {
                vkBridge.send('VKWebAppOpenPayForm', {
                    app_id: APP_ID,
                    action: 'pay-to-user',
                    params: { amount, description: desc }
                }).then(async () => {
                    await incrementCounter(service);
                    vkBridge.send('VKWebAppOpenMessageDialog', {
                        peer_id: GROUP_ID,
                        message: `✅ Оплата прошла. Моя заявка: ${desc}`
                    }).catch(() => window.open(`https://vk.com/im?sel=c${Math.abs(GROUP_ID)}`, '_blank'));
                }).catch(e => {
                    console.error(e);
                    alert('Ошибка оплаты. Попробуйте ещё раз.');
                });
            } else {
                alert(`Тестовый режим: ${amount} ₽. ${desc}`);
                window.open(`https://vk.com/im?sel=c${Math.abs(GROUP_ID)}`, '_blank');
            }
        }
    });
</script>
</body>
</html>
